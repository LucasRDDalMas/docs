name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Run tests
        run: npx vitest run
        working-directory: web

  deploy:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: web
          push: true
          tags: ${{ secrets.REGISTRY }}/docs-poc:${{ github.sha }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            GITHUB_OWNER=${{ secrets.GITHUB_OWNER }}
            GITHUB_REPO=${{ secrets.GITHUB_REPO }}
            GITHUB_DOCS_ROOT=doc

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Write kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: echo "$KUBECONFIG_DATA" > /tmp/kubeconfig

      - name: Deploy via Helm
        env:
          KUBECONFIG: /tmp/kubeconfig
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install docs-poc ./helm/docs-poc \
            --set image.repository="$REGISTRY/docs-poc" \
            --set image.tag="$IMAGE_TAG" \
            --wait
