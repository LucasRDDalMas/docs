apiVersion: v1
kind: Service
metadata:
  name: {{ include "docs-poc.fullname" . }}
  labels:
    {{- include "docs-poc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "docs-poc.selectorLabels" . | nindent 4 }}
